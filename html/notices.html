<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeMod - Thong bao</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .brand img {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        object-fit: cover;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
      }
      .meta {
        color: #475569;
        font-size: 13px;
      }
      .notice {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 16px;
        margin-top: 14px;
      }
      .notice h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      .time {
        color: #64748b;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .content {
        line-height: 1.6;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="brand">
        <img src="https://raw.githubusercontent.com/your-account/your-repo/main/Logo/FreeMod.png" alt="FreeMod" />
        <div>
          <h1>FreeMod - Bang thong bao</h1>
          <div class="meta">Noi dung tinh de hien thi trong tab Thong bao</div>
        </div>
      </div>

      <article class="notice">
        <h2>Thong bao he thong</h2>
        <div class="time">Ngay: 2026-02-22</div>
        <div class="content">Da bo sung co che bat/tat header/menu tu file remote tren Git.</div>
      </article>

      <article class="notice">
        <h2>Luu y van hanh</h2>
        <div class="time">Ngay: 2026-02-22</div>
        <div class="content">Neu stream loi, vui long kiem tra ket noi ADB va khoi dong lai Go server.</div>
      </article>
    </main>
  </body>
</html>
